<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Фото коллекция</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: #111; 
      color: #fff; 
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    header { height: 20px; }

    .years {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 16px;
      position: sticky;
      top: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9), rgba(0,0,0,0.6), transparent);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .years button {
      background: transparent;
      color: rgba(255,255,255,0.5);
      border: none;
      cursor: pointer;
      font-size: 15px;
      letter-spacing: 0.15em;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .years button.active {
      color: #fff;
      transform: scale(1.15);
    }

    .gallery {
      column-count: 4;
      column-gap: 16px;
      padding: 20px;
      width: 100%;
    }

    @media (max-width: 1024px) { .gallery { column-count: 3; } }
    @media (max-width: 768px) { .gallery { column-count: 2; } }
    @media (max-width: 420px) { .gallery { column-count: 1; } }

    .tile {
      break-inside: avoid;
      margin-bottom: 16px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .gallery img:hover {
      transform: scale(1.04);
      opacity: 0.9;
    }

    .year { display: none; }
    .year.active { display: block; }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.4s ease;
      opacity: 0;
    }

    .lightbox.active { 
      display: flex; 
      opacity: 1;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      transform-origin: center center;
      transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    }
  </style>
</head>
<body>

<header></header>

<nav class="years">
  <button data-year="2022" class="active">2022</button>
  <button data-year="2023">2023</button>
  <button data-year="2024">2024</button>
</nav>

<main>
  <section class="gallery year active" data-year="2022"></section>
  <section class="gallery year" data-year="2023"></section>
  <section class="gallery year" data-year="2024"></section>
</main>

<div class="lightbox" id="lightbox">
  <img id="lightbox-img" />
</div>

<script>
  const data = {
    2022: Array.from({ length: 30 }, (_, i) => `https://picsum.photos/seed/2022-${i}/800/600`),
    2023: Array.from({ length: 30 }, (_, i) => `https://picsum.photos/seed/2023-${i}/800/600`),
    2024: Array.from({ length: 30 }, (_, i) => `https://picsum.photos/seed/2024-${i}/800/600`)
  };

  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  let lastRect = null;
  let lastScrollY = 0;
  let lastScrollX = 0;

  function createTile(src) {
    const div = document.createElement('div');
    div.className = 'tile';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    div.appendChild(img);
    return div;
  }

  document.querySelectorAll('.year').forEach(section => {
    const year = section.dataset.year;
    data[year].forEach(src => section.appendChild(createTile(src)));

    section.addEventListener('click', e => {
      if (e.target.tagName !== 'IMG') return;

      const rect = e.target.getBoundingClientRect();
      lastRect = rect;
      lastScrollY = window.scrollY;
      lastScrollX = window.scrollX;

      lightboxImg.src = e.target.src;
      lightbox.classList.add('active');

      const dx = rect.left + rect.width / 2 - window.innerWidth / 2;
      const dy = rect.top + rect.height / 2 - window.innerHeight / 2;
      const scale = rect.width / window.innerWidth;

      lightboxImg.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;

      requestAnimationFrame(() => {
        lightboxImg.style.transform = 'translate(0,0) scale(1)';
      });
    });
  });

  lightbox.addEventListener('click', () => {
    if (!lastRect) {
      lightbox.classList.remove('active');
      return;
    }

    const scrollChanged =
      window.scrollY !== lastScrollY || window.scrollX !== lastScrollX;

    if (scrollChanged) {
      lightbox.style.opacity = '0';
      setTimeout(() => {
        lightbox.classList.remove('active');
        lightbox.style.opacity = '';
        lightboxImg.style.transform = '';
        lightboxImg.src = '';
        lastRect = null;
      }, 400);
      return;
    }

    const lbRect = lightboxImg.getBoundingClientRect();

    const scaleX = lastRect.width / lbRect.width;
    const scaleY = lastRect.height / lbRect.height;

    const dx =
      (lastRect.left + lastScrollX) + lastRect.width / 2 -
      (lbRect.left + lbRect.width / 2 + window.scrollX);

    const dy =
      (lastRect.top + lastScrollY) + lastRect.height / 2 -
      (lbRect.top + lbRect.height / 2 + window.scrollY);

    lightboxImg.style.transform = `translate(${dx}px, ${dy}px) scale(${scaleX}, ${scaleY})`;

    setTimeout(() => {
      lightbox.classList.remove('active');
      lightboxImg.style.transform = '';
      lightboxImg.src = '';
      lastRect = null;
    }, 500);
  });

  const buttons = document.querySelectorAll('.years button');
  const years = document.querySelectorAll('.year');

  buttons.forEach((btn, index) => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      years.forEach(y => y.classList.remove('active'));
      years[index].classList.add('active');
    });
  });
</script>

</body>
</html>
