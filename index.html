<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>coldout — photo archive</title>
  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #000; overflow-x: hidden; }
    section { scroll-margin-top: 100px; }
    .gallery-enter { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    /* Скрываем скроллбар для эстетики, но оставляем функционал */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #18181b; }
  </style>
</head>
<body class="text-zinc-400 font-sans selection:bg-zinc-800">

  <nav class="fixed top-0 left-0 w-full px-6 py-4 md:px-10 flex flex-row justify-between items-center z-50 bg-black/60 backdrop-blur-md border-b border-white/5">
    <div class="text-white tracking-[0.2em] lowercase font-light text-sm md:text-base cursor-pointer" onclick="closeGallery()">
      coldout
    </div>
    <div class="flex items-center space-x-4 md:space-x-6 text-[10px] tracking-[0.1em] lowercase font-light overflow-x-auto">
      <a href="#2026" class="text-zinc-400 hover:text-white transition-colors">2026</a>
      <a href="#2025" class="text-zinc-400 hover:text-white transition-colors">2025</a>
      <a href="#2024" class="text-zinc-400 hover:text-white transition-colors">2024</a>
      <a href="#2023" class="text-zinc-400 hover:text-white transition-colors">2023</a>
      <a href="#2022" class="text-zinc-400 hover:text-white transition-colors">2022</a>
      <a href="#2021" class="text-zinc-400 hover:text-white transition-colors">2021</a>
      <a href="#2020" class="text-zinc-400 hover:text-white transition-colors">2020</a>
    </div>
  </nav>

  <div id="gallery-overlay" class="hidden fixed inset-0 bg-black z-[100] overflow-y-auto p-6 md:p-20 gallery-enter">
    <div class="flex justify-between items-baseline mb-16 max-w-[1600px] mx-auto">
      <h2 id="gallery-title" class="text-white text-3xl font-thin lowercase tracking-tighter"></h2>
      <button onclick="closeGallery()" class="text-zinc-600 hover:text-white uppercase text-[9px] tracking-[0.3em] transition-colors border-b border-zinc-800 hover:border-white pb-1">close</button>
    </div>
    <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 max-w-[1600px] mx-auto pb-20"></div>
  </div>

  <main id="main-content" class="pt-24 px-6 md:px-20 max-w-[1600px] mx-auto transition-opacity duration-500">
    <div id="years-container"></div>
  </main>

  <footer class="p-20 text-center border-t border-zinc-950">
    <div class="text-[9px] lowercase tracking-[0.5em] text-zinc-800">coldout &copy; 2026</div>
  </footer>

  <script>
    const archiveData = [
      { year: "2026", trips: [
        { title: "lofoten islands", img: "https://images.unsplash.com/photo-1534067783941-51c9c239ecfd" },
        { title: "swiss alps", img: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4" }
      ]},
      { year: "2025", trips: [
        { title: "atacama desert", img: "https://images.unsplash.com/photo-1444464666168-49d633b867ad" },
        { title: "madeira coast", img: "https://images.unsplash.com/photo-1555881400-74d7acaacd8b" }
      ]},
      { year: "2024", trips: [
        { title: "kyoto gardens", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e" },
        { title: "tokyo nights", img: "https://images.unsplash.com/photo-1542051841857-5f90071e7989" }
      ]},
      { year: "2023", trips: [
        { title: "dolomites", img: "https://images.unsplash.com/photo-1531366930499-41f667534ae2" },
        { title: "icelandic fog", img: "https://images.unsplash.com/photo-1504893524553-f8591ce26c58" }
      ]},
      { year: "2022", trips: [
        { title: "namibia dunes", img: "https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9" },
        { title: "patagonia peaks", img: "https://images.unsplash.com/photo-1517154421773-0529f29ea451" }
      ]},
      { year: "2021", trips: [
        { title: "scottish highlands", img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb" },
        { title: "nordic cabin", img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e" }
      ]},
      { year: "2020", trips: [
        { title: "empty venice", img: "https://images.unsplash.com/photo-1523906834658-6e24ef2386f9" },
        { title: "quiet lakes", img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470" }
      ]}
    ];

    function init() {
      const container = document.getElementById('years-container');
      archiveData.forEach(item => {
        const section = document.createElement('section');
        section.id = item.year;
        section.className = 'mb-24';
        
        section.innerHTML = `
          <div class="border-b border-zinc-900 pb-2 mb-10">
            <h2 class="text-5xl md:text-6xl font-extralight text-white tracking-tighter">${item.year}</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            ${item.trips.map(trip => `
              <div onclick="openGallery('${trip.title}', '${trip.img}')" class="group cursor-pointer">
                <div class="aspect-[4/5] bg-zinc-900 overflow-hidden mb-5 relative">
                  <img src="${trip.img}?q=80&w=800" class="object-cover w-full h-full grayscale group-hover:grayscale-0 group-hover:scale-105 transition-all duration-1000">
                </div>
                <h3 class="text-xs md:text-sm lowercase tracking-[0.3em] font-medium text-zinc-500 group-hover:text-white transition-colors duration-500 italic">
                  ${trip.title} — collection
                </h3>
              </div>
            `).join('')}
          </div>
        `;
        container.appendChild(section);
      });
    }

    function openGallery(title, baseImg) {
      const overlay = document.getElementById('gallery-overlay');
      const grid = document.getElementById('gallery-grid');
      const gTitle = document.getElementById('gallery-title');

      gTitle.innerText = title;
      grid.innerHTML = '';

      for (let i = 1; i <= 50; i++) {
        const div = document.createElement('div');
        div.className = 'aspect-[3/4] bg-zinc-950 overflow-hidden';
        div.innerHTML = `<img src="https://picsum.photos/seed/${title + i}/600/800" class="object-cover w-full h-full opacity-60 hover:opacity-100 hover:scale-105 transition-all duration-700 cursor-crosshair">`;
        grid.appendChild(div);
      }

      overlay.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
      overlay.scrollTo(0, 0);
    }

    function closeGallery() {
      document.getElementById('gallery-overlay').classList.add('hidden');
      document.body.style.overflow = 'auto';
    }

    init();
  </script>
</body>
</html>
