<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Фото коллекция</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', Arial, sans-serif;
      background: #0e0e0e;
      color: #fff;
      overscroll-behavior: none;
    }

    /* HEADER / YEARS */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 20px 24px;
      display: flex;
      justify-content: flex-end;
      background: linear-gradient(to bottom, rgba(14,14,14,.95), rgba(14,14,14,.6), transparent);
      backdrop-filter: blur(12px);
    }

    .years {
      display: flex;
      gap: 18px;
      font-size: 13px;
      letter-spacing: .25em;
      text-transform: uppercase;
    }

    .years button {
      background: none;
      border: none;
      color: rgba(255,255,255,.45);
      cursor: pointer;
    }

    .years button.active { color: #fff; }

    /* MAIN GALLERY */
    main {
      padding: 40px 24px 80px;
    }

    .year { display: none; }
    .year.active { display: block; }

    .gallery {
      column-count: 3;
      column-gap: 24px;
    }

    @media (max-width: 1024px) { .gallery { column-count: 2; } }
    @media (max-width: 520px)  { .gallery { column-count: 1; } }

    /* FOLDER TILE */
    .folder {
      break-inside: avoid;
      margin-bottom: 32px;
      cursor: pointer;
    }

    .folder-preview {
      position: relative;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: #000;
    }

    .folder-preview img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      animation: folderCarousel 6s infinite;
    }

    .folder-preview img:nth-child(1) { animation-delay: 0s; }
    .folder-preview img:nth-child(2) { animation-delay: 2s; }
    .folder-preview img:nth-child(3) { animation-delay: 4s; }

    @keyframes folderCarousel {
      0% { opacity: 0; }
      10% { opacity: 1; }
      35% { opacity: 1; }
      45% { opacity: 0; }
      100% { opacity: 0; }
    }

    .folder-title {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: .18em;
      opacity: .85;
      text-transform: uppercase;
    }

    /* FOLDER VIEW */
    .folder-view {
      position: fixed;
      inset: 0;
      background: #0e0e0e;
      z-index: 200;
      display: none;
      opacity: 0;
      transform: scale(.97);
      transition: opacity .45s ease, transform .45s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
    }

    .folder-view.active {
      display: block;
      opacity: 1;
      transform: scale(1);
    }

    .folder-header {
      position: sticky;
      top: 0;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: linear-gradient(to bottom, rgba(14,14,14,.95), rgba(14,14,14,.6), transparent);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .back-btn {
      font-size: 12px;
      letter-spacing: .2em;
      opacity: .6;
      cursor: pointer;
      text-transform: uppercase;
    }

    .folder-header-title {
      font-size: 13px;
      letter-spacing: .25em;
      text-transform: uppercase;
    }

    .folder-gallery {
      padding: 40px 24px 80px;
      column-count: 3;
      column-gap: 24px;
    }

    @media (max-width: 1024px) { .folder-gallery { column-count: 2; } }
    @media (max-width: 520px)  { .folder-gallery { column-count: 1; } }

    .tile { break-inside: avoid; margin-bottom: 24px; }

    .tile img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(14,14,14,.85);
      backdrop-filter: blur(24px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      transition: transform .4s cubic-bezier(.4,0,.2,1);
    }

  </style>
</head>
<body>

<header>
  <nav class="years">
    <button class="active">2023</button>
    <button>2024</button>
  </nav>
</header>

<main>
  <section class="gallery year active" data-year="2023"></section>
  <section class="gallery year" data-year="2024"></section>
</main>

<div class="folder-view" id="folderView">
  <div class="folder-header">
    <span class="back-btn" id="backBtn">← Back</span>
    <span class="folder-header-title" id="folderTitle"></span>
  </div>
  <div class="folder-gallery" id="folderGallery"></div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg"></div>

<script>
const data = {
  2023: [
    { title: 'Малайзия', photos: Array.from({ length: 24 }, (_, i) => `https://picsum.photos/seed/my${i}/900/600`) },
    { title: 'Япония',  photos: Array.from({ length: 24 }, (_, i) => `https://picsum.photos/seed/jp${i}/900/600`) }
  ],
  2024: [
    { title: 'Италия', photos: Array.from({ length: 24 }, (_, i) => `https://picsum.photos/seed/it${i}/900/600`) }
  ]
};

const folderView = document.getElementById('folderView');
const folderGallery = document.getElementById('folderGallery');
const folderTitle = document.getElementById('folderTitle');
const backBtn = document.getElementById('backBtn');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

function createFolder(folder) {
  const el = document.createElement('div');
  el.className = 'folder';

  const preview = document.createElement('div');
  preview.className = 'folder-preview';

  folder.photos.slice(0, 3).forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    preview.appendChild(img);
  });

  const title = document.createElement('div');
  title.className = 'folder-title';
  title.textContent = folder.title;

  el.append(preview, title);
  el.onclick = () => openFolder(folder, preview);

  return el;
}

function openFolder(folder, previewEl) {
  const rect = previewEl.getBoundingClientRect();

  folderTitle.textContent = folder.title;
  folderGallery.innerHTML = '';

  folder.photos.forEach(src => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const img = document.createElement('img');
    img.src = src;
    img.onclick = () => openLightbox(img);
    tile.appendChild(img);
    folderGallery.appendChild(tile);
  });

  folderView.style.transformOrigin = `${rect.left + rect.width / 2}px ${rect.top + rect.height / 2}px`;
  folderView.classList.add('active');
}

function openLightbox(img) {
  lightboxImg.src = img.src;
  lightbox.classList.add('active');
}

lightbox.onclick = () => {
  lightbox.classList.remove('active');
  lightboxImg.src = '';
};

backBtn.onclick = () => {
  folderView.classList.remove('active');
};

Object.keys(data).forEach(year => {
  const section = document.querySelector(`.year[data-year="${year}"]`);
  data[year].forEach(folder => section.appendChild(createFolder(folder)));
});

const yearButtons = document.querySelectorAll('.years button');
const years = document.querySelectorAll('.year');

yearButtons.forEach((btn, i) => {
  btn.onclick = () => {
    yearButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    years.forEach(y => y.classList.remove('active'));
    years[i].classList.add('active');
  };
});
</script>

</body>
</html>
